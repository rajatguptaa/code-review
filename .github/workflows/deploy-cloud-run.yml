name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  # Google Cloud project ID (configured as a GitHub Repository Variable)
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  
  # TODO: Replace with your Cloud Run region
  REGION: us-central1
  
  # TODO: Replace with your Artifact Registry location (usually same as region)
  GAR_LOCATION: us-central1
  
  # TODO: Replace with your desired Cloud Run service name
  SERVICE: code-review-agent

jobs:
  deploy:
    # 'id-token: write' is required for Workload Identity Federation (WIF)
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- OPTION 1: Use a Service Account JSON Key (simpler but less secure) --
      # Create a Service Account, assign required roles, generate a JSON key,
      # and save it as a GitHub Secret named GCP_CREDENTIALS.
      - name: Google Auth (Service Account Key)
        id: auth-key
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # -- OPTION 2: Use Workload Identity Federation (recommended state of the art) --
      # Uncomment the step below and comment out "OPTION 1" to use WIF instead.
      # Create a GitHub Secret named WIF_PROVIDER containing your provider ID and
      # WIF_SERVICE_ACCOUNT containing your service account email.
      # - name: Google Auth (Workload Identity Federation)
      #   id: auth-wif
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
      #     service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      # Authenticate Docker to Google Cloud Artifact Registry
      - name: Docker Auth
        id: docker-auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}
          # Note: If using WIF (Option 2), comment out 'username' and 'password' above,
          # and Docker will automatically authenticate if WIF is configured.

      - name: Build and Push Docker Container
        run: |-
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" ./
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}
          flags: '--allow-unauthenticated'
          env_vars: |-
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

      # Display the deployed Cloud Run URL
      - name: Show Cloud Run URL
        run: echo "Successfully deployed! Service is available at ${{ steps.deploy.outputs.url }}"
