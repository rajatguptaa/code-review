name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  # Google Cloud project ID (configured as a GitHub Repository Variable)
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  
  # TODO: Replace with your Cloud Run region
  REGION: us-central1
  
  # TODO: Replace with your Artifact Registry location (usually same as region)
  GAR_LOCATION: us-central1
  
  # TODO: Replace with your desired Cloud Run service name
  SERVICE: code-review-agent

jobs:
  deploy:
    # 'id-token: write' is required for Workload Identity Federation (WIF)
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Workload Identity Federation (WIF) --
      # Since Service Account keys are blocked, we use WIF.
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Container
        run: |-
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" ./
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/app:${{ github.sha }}
          flags: '--allow-unauthenticated'
          env_vars: |-
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

      # Display the deployed Cloud Run URL
      - name: Show Cloud Run URL
        run: echo "Successfully deployed! Service is available at ${{ steps.deploy.outputs.url }}"
